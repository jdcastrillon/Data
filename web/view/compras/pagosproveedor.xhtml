<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://java.sun.com/jsf/html"
                xmlns:f="http://java.sun.com/jsf/core"
                xmlns:ui="http://java.sun.com/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:a="http://xmlns.jcp.org/jsf/passthrough"
                template="/templet/template.xhtml">

    <ui:define name="title">Dashboard</ui:define>

    <ui:define name="head">
        <script type="text/javascript">
            //<![CDATA[
            function skinChart() {
                this.cfg.shadow = false;
                this.cfg.title = '';
                this.cfg.seriesColors = ['#FFC107', '#03A9F4'];
                this.cfg.grid = {
                    background: '#ffffff',
                    borderColor: '#ffffff',
                    gridLineColor: '#EEEEEE',
                    shadow: false
                };
                this.cfg.axesDefaults = {
                    rendererOptions: {
                        textColor: '#212121'
                    }
                };
                this.cfg.seriesDefaults = {
                    shadow: false,
                    lineWidth: 1,
                    markerOptions: {
                        shadow: false,
                        size: 7,
                        style: 'circle'
                    }
                }
            }

            //]]>  
        </script>
        <style type="text/css">
            .main-content {
                padding: 0;
            }
        </style>
        <style type="text/css">
            .knob-container {
                display: inline-block;
                padding: 10px;
            }
        </style>
        <script type="text/javascript">
            function cierreCuentas(xhr, status, args) {
                PF('dialogfac').hide();
            }
        </script>
    </ui:define>

    <ui:define name="content">
        <div class="ui-g">
            <div class="ui-g-12">
                <div class="card card-w-title">
                    <p:panel id="panelProv" header="Pagos Proveedores" toggleable="true" toggleSpeed="500" widgetVar="DialogFac" style="margin-bottom:20px">   

                        <h:form id="formPago" onkeypress="if (event.keyCode == 13)
                                    event.returnValue = false;">
                            <p:growl id="growl" showDetail="true" life="5000" />  

                            <div class="ui-g ui-fluid form-group">
                                <div class="ui-g-12 ui-md-3">
                                    <div class="ui-g-2 ui-md-2">
                                        <p:commandButton icon="ui-icon-add"
                                                         action="#{pagosProveedorControlador.prepareNuevo() }" 
                                                         ajax="true" update=":formPago :formlistComp"
                                                         style="background-color: #939393" 
                                                         disabled="#{pagosProveedorControlador.nuevo}"></p:commandButton>
                                    </div>
                                    <div class="ui-g-2 ui-md-2">
                                        <p:commandButton icon="ui-icon-create"
                                                         action="#{pagosProveedorControlador.prepareEdit() }" 
                                                         ajax="true" update=":formPago :formlistComp"
                                                         style="background-color: #939393" 
                                                         disabled="#{pagosProveedorControlador.editar}"></p:commandButton>
                                    </div>
                                    <div class="ui-g-2 ui-md-2">
                                        <p:commandButton icon="ui-icon-clear"
                                                         action="#{pagosProveedorControlador.prepareEliminar()}" 
                                                         ajax="true" update=":formPago :formlistComp"
                                                         style="background-color: #939393" 
                                                         disabled="#{pagosProveedorControlador.eliminar}"></p:commandButton>
                                    </div>
                                </div>
                            </div>
                            <p:tabView id="TabOC" >
                                <p:tab title="General">
                                    <div class="ui-g ui-fluid form-group">
                                        <div class="ui-g-12 ui-md-6">
                                            <div class="ui-g-12 ui-md-3">
                                                <h:outputText value="Empresa :"></h:outputText>
                                            </div>                                              
                                            <div class="ui-g-10 ui-md-9">                                                
                                                <p:selectOneMenu value="#{pagosProveedorControlador.objPagos.cod_emp}" disabled="#{pagosProveedorControlador.aceptar}">
                                                    <f:selectItems value="#{pagosProveedorControlador.listEmpresas}" var="emp" 
                                                                   itemValue="#{emp.cod_emp}" itemLabel="#{emp.nom_emp}"></f:selectItems> 
                                                </p:selectOneMenu>
                                            </div>
                                            <div class="ui-g-12 ui-md-3">
                                                <h:outputText value="Proveedor :"></h:outputText>
                                            </div>                                              
                                            <div class="ui-g-10 ui-md-9">                                                
                                                <p:selectOneMenu value="#{pagosProveedorControlador.objPagos.cod_proveedor}" disabled="#{pagosProveedorControlador.aceptar}">                                                    
                                                    <p:ajax event="change" listener="#{pagosProveedorControlador.facturasPendientes()}"
                                                            update="Lfacturas"></p:ajax>
                                                    <f:selectItem itemLabel="Seleccione Proveedor" itemValue="0"></f:selectItem>
                                                    <f:selectItems value="#{pagosProveedorControlador.listProveedor}" 
                                                                   var="prov" itemValue="#{prov.cod_provedor}" 
                                                                   itemLabel="#{prov.razon_social}"></f:selectItems> 
                                                </p:selectOneMenu>
                                            </div>
                                            <div class="ui-g-2 ui-md-3">
                                                <h:outputText value="Observacion :"></h:outputText>
                                            </div>
                                            <div class="ui-g-10 ui-md-9">
                                                <p:inputTextarea  value="#{pagosProveedorControlador.objPagos.observacion}" disabled="#{pagosProveedorControlador.aceptar}" style="color:  black"></p:inputTextarea>
                                            </div>      
                                        </div>
                                        <div class="ui-g-12 ui-md-6">
                                            <div class="ui-g-2 ui-md-4">
                                                <h:outputText value="Fecha :"></h:outputText>
                                            </div>
                                            <div class="ui-g-10 ui-md-8">
                                                <p:calendar id="button" value="#{pagosProveedorControlador.objPagos.d_fec_doc}" showOn="button" disabled="#{pagosProveedorControlador.aceptar}"
                                                            locale="de" navigator="true" pattern="dd/MM/yyyy" />
                                            </div>


                                        </div>

                                    </div>

                                    <div class="ui-g ui-fluid form-group">
                                        <div class="ui-g-12 ui-md-12">
                                            <p:dataTable id="Lfacturas" var="facturas" value="#{pagosProveedorControlador.objPagos.facturas}">

                                                <p:column headerText="#" style="width: 5%">
                                                    <p:selectBooleanCheckbox value="#{facturas.pagar}" itemLabel="Basic"/>
                                                </p:column>
                                                <p:column headerText="Fecha" style="width: 20%">
                                                    <h:outputText value="#{facturas.fec_doc}" />
                                                </p:column>
                                                <p:column headerText="Factura" style="width: 20%">
                                                    <h:outputText value="#{facturas.factura}" />
                                                </p:column>
                                                <p:column headerText="Saldo" style="width: 20%">
                                                    <h:outputText value="#{facturas.imp_saldo}" />
                                                </p:column>
                                                <p:column headerText="Pago" style="width: 20%">
                                                    <h:inputText value="#{facturas.imp_pago}" >
                                                        <p:ajax listener="#{pagosProveedorControlador.totalesGrilla(facturas)}" 
                                                                update="formPago:TabOC:OCNetos"></p:ajax>
                                                    </h:inputText>                                                    
                                                </p:column>
                                            </p:dataTable>

                                        </div>
                                    </div>


                                    <div class="ui-g ui-fluid form-group">
                                        <div class="ui-g-12 ui-md-5"></div>
                                        <div class="ui-g-12 ui-md-4"></div>
                                        <div class="ui-g-12 ui-md-3">
                                            <div class="ui-g-2 ui-md-5">
                                                <h:outputText id="OCNeto" value="TOTAL :" style="font-weight: bold"></h:outputText>
                                            </div>
                                            <div class="ui-g-10 ui-md-7">
                                                <h:outputText id="OCNetos" value="#{pagosProveedorControlador.objPagos.importe}" style="font-weight: bold"> </h:outputText>
                                            </div>                                            
                                        </div>
                                    </div>

                                </p:tab>
                                <p:tab title="Log">
                                    <p:dataTable var="log" value="#{pagosProveedorControlador.objPagos.logs}">
                                        <p:column headerText="Proceso" style="width: 20%">
                                            <h:outputText value="#{log.proceso}" />
                                        </p:column>

                                        <p:column headerText="Usuario" style="width: 20%">
                                            <h:outputText value="#{log.usuario}" />
                                        </p:column>
                                        <p:column headerText="Operacion" style="width: 20%">
                                            <h:outputText value="#{log.operacion}" />
                                        </p:column>
                                        <p:column headerText="Fecha" style="width: 20%">
                                            <h:outputText value="#{log.fecha}" />
                                        </p:column>


                                    </p:dataTable>  
                                </p:tab>
                            </p:tabView>


                            <div class="ui-g ui-fluid form-group">
                                <div class="ui-g-12 ui-md-3"> </div>
                                <div class="ui-g-12 ui-md-4"></div>
                                <div class="ui-g-12 ui-md-5">
                                    <div class="ui-g-0 ui-md-4"></div>

                                    <div class="ui-g-5 ui-md-4">
                                        <p:commandButton value="Aceptar"  action="#{pagosProveedorControlador.transaccion()}" ajax="true" update=":formPago :formlistComp"
                                                         style="background-color: #939393" 
                                                         disabled="#{pagosProveedorControlador.aceptar}"> </p:commandButton>
                                    </div>
                                    <div class="ui-g-5 ui-md-4">
                                        <p:commandButton value="Cancelar" action="#{pagosProveedorControlador.cancelarEventos()}" ajax="true" update=":formPago :formlistComp"
                                                         style="background-color: #939393" > </p:commandButton>
                                    </div>
                                </div>
                            </div>
                        </h:form>
                    </p:panel>     
                    <br/>
                    <p:panel id="PanelDoc2" toggleable="true" toggleSpeed="500" widgetVar="panel" style="margin-bottom:20px">   
                        <h:form id="formlistComp">
                            <div class="ui-g ui-fluid form-group">
                                <div class="ui-g-12 ui-md-12">
                                    <div class="ui-g-12 ui-md-12">
                                        <div class="ui-g-12 ui-md-1">
                                            Busqueda :
                                        </div>
                                        <div class="ui-g-12 ui-md-5">
                                            <p:inputText value="#{pagosProveedorControlador.valorBusqueda}" title="NIT Proveedor ò Codigo de OC">
                                            </p:inputText>
                                        </div>
                                        <div class="ui-g-12 ui-md-2">
                                            <p:commandButton icon="ui-icon-search"
                                                             action="#{pagosProveedorControlador.busquedaDatos()}" 
                                                             ajax="true" update=":formlistComp"
                                                             style="background-color: #939393"></p:commandButton>

                                            <p:commandButton  icon="ui-icon-clear"
                                                              action="#{pagosProveedorControlador.limpiarDatos()}" 
                                                              ajax="true" update=":formlistComp"
                                                              style="background-color: #939393"></p:commandButton>

                                        </div>

                                    </div>
                                    <div class="ui-g-12 ui-md-12">

                                        <p:dataTable var="pagos" value="#{pagosProveedorControlador.listaPagos}" 
                                                     rows="10"
                                                     paginator="true"
                                                     paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}"
                                                     rowsPerPageTemplate="5,10,15">
                                            <f:facet name="header">
                                                Lista de Pagos Proveedor
                                            </f:facet>

                                            <p:column headerText="Nit" style="width: 10%">
                                                <h:outputText value="#{pagos.nit_proveedor}" />
                                            </p:column>
                                            <p:column headerText="Proveedor" style="width: 40%">
                                                <h:outputText value="#{pagos.nom_proveedor}" />
                                            </p:column>

                                            <p:column headerText="Fecha" style="width: 10%">
                                                <h:outputText value="#{pagos.fec_doc}" />
                                            </p:column>

                                            <p:column headerText="Pago" style="width: 10%">
                                                <h:outputText value="#{pagos.importe}" />
                                            </p:column>

                                            <p:column headerText="Descripcion" style="width: 10%">
                                                <center>
                                                    <p:commandButton icon="ui-icon-create"   style="background-color: #939393" 
                                                                     action="#{pagosProveedorControlador.prepareCrud(pagos, 1)}" ajax="true" update=":formPago"> </p:commandButton>
                                                    <p:commandButton icon="ui-icon-clear" style="background-color: #939393" 
                                                                     action="#{pagosProveedorControlador.prepareCrud(pagos, 2)}"  ajax="true" update=":formPago"> </p:commandButton>
                                                    <p:commandButton icon="ui-icon-remove-red-eye" style="background-color: #939393" 
                                                                     action="#{pagosProveedorControlador.prepareCrud(pagos, 3)}"  ajax="true" update=":formPago"> </p:commandButton>
                                                </center>
                                            </p:column>


                                        </p:dataTable>  

                                    </div>
                                </div>
                            </div>
                        </h:form>
                    </p:panel>
                </div>
            </div>
        </div>
    </ui:define>

</ui:composition>
